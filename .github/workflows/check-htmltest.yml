# Link check for docs using htmltest.
# Builds docs locally, mirrors the dev server, and validates links.
# Creates a Linear ticket if broken links are found.
#
# Required secrets:
#   LINEAR_API_KEY - Linear API key from https://linear.app/settings/api
#   LINEAR_TEAM_KEY - Team key for the created issue (e.g. ENG)

name: "🔗 Docs Link Check"

on:
  push:
    branches: [main]
  pull_request:
# on:
#   schedule:
#     # Run every Monday at 00:00 UTC
#     - cron: "0 0 * * 1"
#   workflow_dispatch:

permissions:
  contents: read

env:
  UV_FROZEN: "true"
  UV_NO_SYNC: "true"

jobs:
  check-links:
    name: "Check docs links"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: "📋 Checkout"
        uses: actions/checkout@v6

      - name: "Configure Python with uv"
        uses: "./.github/actions/uv_setup"
        with:
          python-version: "3.13"

      - name: "Install Python dependencies"
        run: uv sync --group test

      - name: "Configure Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: "Install Mintlify CLI"
        run: npm i -g mint@latest

      - name: "Build documentation"
        run: PYTHONPATH=${{ github.workspace }} uv run pipeline build

      - name: "Install htmltest"
        run: |
          curl -sSfL https://htmltest.wjdp.uk | bash -s -- -b ./bin
          ./bin/htmltest -v

      - name: "Start Mint dev server and mirror"
        env:
          CI: "true"
          BROWSER: "none"
          # Ink (Mint's CLI) needs a TTY to output; script provides a PTY
          TERM: "xterm-256color"
        run: |
          echo "Build dir contents:"
          ls -la build/ | head -20
          echo ""
          cd build && script -q -c "mint dev --port 3000 --disable-openapi" /tmp/mint.log &
          MINT_PID=$!
          echo "Started mint (PID $MINT_PID). Waiting for dev server..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/ > /dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Server failed to start after 2 minutes."
              echo "Mint process running? $(kill -0 $MINT_PID 2>/dev/null && echo yes || echo no)"
              echo "Processes listening on ports:"
              ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || true
              echo "--- /tmp/mint.log ---"
              cat /tmp/mint.log
              echo "--- end log ---"
              exit 1
            fi
            if [ $((i % 5)) -eq 0 ] && [ -s /tmp/mint.log ]; then
              echo "[$i] Mint output so far:"
              tail -50 /tmp/mint.log
            fi
            sleep 2
          done
          cd "${{ github.workspace }}"
          MIRROR_DIR="${{ github.workspace }}/docs-mirror"
          mkdir -p "$MIRROR_DIR"
          wget \
            --recursive \
            --level=4 \
            --no-parent \
            --no-host-directories \
            --convert-links \
            --adjust-extension \
            --domains=localhost \
            --wait=0 \
            --timeout=30 \
            --tries=2 \
            -e robots=off \
            --user-agent="LangChain-Docs-Link-Check/1.0" \
            -P "$MIRROR_DIR" \
            http://localhost:3000/
          if [ ! -d "$MIRROR_DIR" ] || [ -z "$(ls -A "$MIRROR_DIR" 2>/dev/null)" ]; then
            echo "Error: wget did not mirror docs to $MIRROR_DIR"
            echo "Contents of workspace:"
            ls -la "${{ github.workspace }}/"
            exit 1
          fi
          echo "Mirrored $(find "$MIRROR_DIR" -type f | wc -l) files to docs-mirror"

      - name: "Run htmltest"
        id: htmltest
        run: |
          set -o pipefail
          ROOT="${{ github.workspace }}/docs-mirror"
          if [ ! -d "$ROOT" ]; then
            echo "Error: mirrored docs dir missing: $ROOT"
            ls -la "${{ github.workspace }}/" || true
            exit 1
          fi
          ./bin/htmltest -l 2 "$ROOT" 2>&1 | tee htmltest-output.txt
        continue-on-error: true

      - name: "Upload htmltest output"
        if: steps.htmltest.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: htmltest-output
          path: htmltest-output.txt

      - name: "Create Linear ticket on broken links"
        if: steps.htmltest.outcome == 'failure'
        uses: ctriolo/action-create-linear-issue@v0.7
        with:
          linear-api-key: ${{ secrets.LINEAR_API_KEY }}
          linear-team-key: ${{ secrets.LINEAR_TEAM_KEY }}
          linear-issue-title: "[Docs] Broken links detected in documentation build"
          linear-issue-description: |
            htmltest found broken links during the docs link check (local build).

            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            See the workflow logs for full htmltest output.
          linear-attachment-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          linear-attachment-title: "GitHub Actions run"
